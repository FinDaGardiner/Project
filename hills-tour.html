<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Hills Tour - Explore Edinburgh</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
</head>
<body>

    <header class="site-header">
        <button class="hamburger" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <h1 class="header-title">Explore Edinburgh</h1>
    </header>

    <nav class="overlay-menu" id="overlayMenu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="toursfirstpage.html">Tours</a></li>
            <li><a href="reviews.html">Feedback</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>

    <div class="desktop-nav">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="toursfirstpage.html">Tours</a></li>
                <li><a href="reviews.html">Feedback</a></li></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <h2 class="page-title">The 7 Hills of Edinburgh Tour</h2>

        <section class="tour-toolbar" aria-label="Tour controls">
            <div class="route-controls">
                <button id="shortestRouteBtn" class="action-btn" type="button">Shortest route</button>
                <button id="customOrderBtn" class="action-btn" type="button">Custom order</button>
                <button id="resetTourBtn" class="action-btn secondary" type="button">Reset tour</button>
                <button id="skipStopBtn" class="action-btn warning" type="button">Skip stop</button>
                <button id="focusLocationBtn" class="action-btn secondary" type="button">Focus on me</button>
            </div>

            <div class="progress-wrap" aria-label="Progress">
                <div id="progressText" class="progress-text"></div>
                <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
        </section>

        <div id="next-point-name"></div>
        <button id="next-point-btn" class="action-btn next-stop-btn" type="button">Next</button>
        <div id="map"></div>
    </main>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

    <div id="arrivalModal" class="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="arrivalTitle">
        <button id="arrivalClose" class="modal-close" aria-label="Close">✕</button>
			<h3 id="arrivalTitle"></h3>
			<img id="arrivalImg" alt="">
			<p id="arrivalText"></p>
        <button id="arrivalNext" class="action-btn" type="button">Next stop</button>
      </div>
    </div>

    <div id="orderModal" class="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="orderTitle">
        <button id="orderClose" class="modal-close" aria-label="Close">✕</button>
			<h3 id="orderTitle">Custom order</h3>
			<p class="modal-help">Drag stops to reorder. This applies to remaining stops.</p>
			<ul id="orderList" class="order-list" aria-label="Reorder stops"></ul>
			<div class="modal-actions">
          <button id="orderSave" class="action-btn" type="button">Save order</button>
          <button id="orderCancel" class="action-btn secondary" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="scripts/applySettings.js"></script>
	<script src="scripts/tour-shared.js"></script>
    <script src="scripts/map-hills.js?v=walk2"></script>
    <script src="scripts/menu.js"></script>
</body>
</html>
